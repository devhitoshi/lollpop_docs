<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドキュメント - ろりぽっぷ!!!!!!!</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <header class="header">
        <h1 class="logo">🍭 ろりぽっぷ!!!!!!! 🍭</h1>
        <p class="tagline">〜ドキュメント＆ポータル〜</p>
    </header>

    <main class="container">
        <section class="menu-section">
            <a href="index.html"
                style="color: var(--accent-color); font-weight: bold; text-decoration: none; display: inline-block; margin-bottom: 20px;">←
                メニューに戻る</a>

            <div id="content">データを読み込み中...</div>
        </section>
    </main>

    <script>
        // URLの ?file=〇〇 の部分を取得する
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');

        if (file) {
            // 指定されたファイルを裏側で取得
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('読み込みエラー');
                    }
                    return response.text();
                })
                .then(text => {
                    // 取得したMarkdownテキストをHTMLに変換して画面に表示
                    const contentDiv = document.getElementById('content');
                    contentDiv.innerHTML = marked.parse(text);

                    // --- 🌟 ここから目次（TOC）自動生成の仕組み ---
                    const headers = contentDiv.querySelectorAll('h2, h3'); // h2とh3を集める

                    if (headers.length > 0) {
                        // 目次の外枠を作る
                        const tocContainer = document.createElement('div');
                        tocContainer.className = 'toc-box';
                        tocContainer.innerHTML = '<p class="toc-title">🐾 目次 🐾</p><ul class="toc-list"></ul>';
                        const tocList = tocContainer.querySelector('.toc-list');

                        headers.forEach((header, index) => {
                            // 見出しにIDがない場合は自動で付ける（リンクで飛べるようにするため）
                            if (!header.id) {
                                header.id = 'heading-' + index;
                            }

                            const li = document.createElement('li');
                            // h2かh3かでデザインを変えるためのクラスを付ける
                            li.className = header.tagName.toLowerCase() === 'h2' ? 'toc-h2' : 'toc-h3';

                            const a = document.createElement('a');
                            a.href = '#' + header.id;
                            a.textContent = header.textContent;

                            li.appendChild(a);
                            tocList.appendChild(li);
                        });

                        // コンテンツの一番上（タイトルの下あたり）に目次を挿入
                        contentDiv.insertBefore(tocContainer, contentDiv.firstChild);
                    }
                    // --- 🌟 目次自動生成ここまで ---
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = '<p>ファイルの読み込みに失敗しました。</p>';
                });
        } else {
            document.getElementById('content').innerHTML = '<p>ファイルが指定されていません。</p>';
        }
    </script>
</body>

</html>
